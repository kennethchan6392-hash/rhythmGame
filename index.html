<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音楽の森 | 節奏訓練</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK for online leaderboard -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="h-screen w-screen flex flex-col relative">

    <!-- 安全起動點擊避罩罩 -->
    <div id="start-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center text-white cursor-pointer backdrop-blur-sm overflow-hidden" style="background:linear-gradient(180deg,#0D2117 0%,#153020 40%,#1a3820 70%,#0A1B0E 100%)" onclick="initApp()">
        <!-- 森林山州剛影 -->
        <div style="position:absolute;bottom:0;left:0;right:0;height:28%;background:radial-gradient(ellipse 150% 100% at 20% 100%,#071a0c 0%,transparent 60%),radial-gradient(ellipse 130% 95% at 75% 100%,#0c2214 0%,transparent 55%);pointer-events:none"></div>
        <!-- 螢火蟲 -->
        <div style="position:absolute;top:18%;left:28%;width:4px;height:4px;border-radius:50%;background:#c8ff88;opacity:0.75;animation:float 4s ease-in-out 0.5s infinite;box-shadow:0 0 10px #c8ff88,0 0 20px #8aff44"></div>
        <div style="position:absolute;top:30%;left:62%;width:3px;height:3px;border-radius:50%;background:#a8f868;opacity:0.65;animation:float 5s ease-in-out 1.3s infinite;box-shadow:0 0 8px #a8f868,0 0 15px #7aee30"></div>
        <div style="position:absolute;top:22%;left:16%;width:3px;height:3px;border-radius:50%;background:#d8ff98;opacity:0.6;animation:float 4.5s ease-in-out 2.1s infinite;box-shadow:0 0 8px #d8ff98"></div>
        <div style="position:absolute;top:12%;left:75%;width:2px;height:2px;border-radius:50%;background:#b8ff78;opacity:0.5;animation:float 6s ease-in-out 0.8s infinite;box-shadow:0 0 6px #b8ff78"></div>
        <div class="relative z-10 flex flex-col items-center">
            <div class="text-8xl mb-5" style="animation:float 3s ease-in-out infinite;filter:drop-shadow(0 4px 20px rgba(100,210,80,0.5))">&#127807;</div>
            <h1 class="text-4xl font-black mb-2 tracking-widest" style="text-shadow:0 2px 20px rgba(120,220,80,0.5)">&#38899;&#27005;&#12398;&#26862;</h1>
            <p class="text-xs text-white/50 mb-8 tracking-widest">節奏訓練・小學音樂課</p>
            <p class="text-base px-8 py-3 rounded-full border border-white/20 hover:bg-white/10 transition-all" style="background:rgba(255,255,255,0.08)">輕觸螢幕，進入森林 ♪</p>
        </div>
    </div>

    <!-- 提示訊息 Toast -->
    <div id="toast-msg" class="fixed top-8 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white font-bold px-6 py-3 rounded-lg shadow-xl z-50 transition-opacity duration-300 opacity-0 pointer-events-none text-center"></div>

    <!-- 學生資料表單 -->
    <div id="student-profile-overlay" class="fixed inset-0 z-48 flex flex-col items-center justify-center text-white hidden backdrop-blur-md" style="background:linear-gradient(160deg,rgba(22,55,35,0.97),rgba(18,45,28,0.97),rgba(10,30,18,0.97))">
        <div class="text-6xl mb-4" style="animation: float 3s ease-in-out infinite">📝</div>
        <h2 class="text-3xl font-black mb-2 tracking-wide">學生資料</h2>
        <p class="text-sm text-white/60 mb-8">請輸入你的資料開始遊戲</p>
        <div class="w-full max-w-sm px-8 space-y-5">
            <div>
                <label class="text-xs text-white/70 block mb-1 font-bold">姓名 Name</label>
                <input type="text" id="input-student-name" placeholder="你的名字" class="student-input" maxlength="20">
            </div>
            <div>
                <label class="text-xs text-white/70 block mb-1 font-bold">班級 Class</label>
                <input type="text" id="input-student-class" placeholder="例: 3A" class="student-input" maxlength="10">
            </div>
            <div>
                <label class="text-xs text-white/70 block mb-1 font-bold">學號 No.</label>
                <input type="text" id="input-student-no" placeholder="例: 15" class="student-input" maxlength="10">
            </div>
            <button onclick="submitStudentProfile()" class="btn btn-wood btn-lg btn-full mt-4">✨ 開始遊戲</button>
        </div>
    </div>

    <!-- 學習模式選單 -->
    <div id="view-learning" class="view-panel flex-1 flex flex-col h-full overflow-hidden">
        <!-- 浮動音符裝飾層 -->
        <div class="floating-notes-bg" aria-hidden="true">
            <span class="fn" style="--x:8%;--d:0s;--s:1.1">&#9833;</span>
            <span class="fn" style="--x:20%;--d:1.4s;--s:0.8">&#9834;</span>
            <span class="fn" style="--x:35%;--d:0.6s;--s:1.3">&#9835;</span>
            <span class="fn" style="--x:50%;--d:2.1s;--s:0.9">&#9833;</span>
            <span class="fn" style="--x:64%;--d:0.3s;--s:1.2">&#9836;</span>
            <span class="fn" style="--x:78%;--d:1.7s;--s:0.7">&#9834;</span>
            <span class="fn" style="--x:90%;--d:0.9s;--s:1.0">&#9835;</span>
            <span class="fn" style="--x:14%;--d:2.5s;--s:0.85">&#9836;</span>
        </div>
        <div class="pt-6 pb-6 px-8 flex justify-between items-center text-white bg-black/20 backdrop-blur-sm">
            <div class="flex flex-col">
                <div class="text-4xl font-black tracking-wider">🎵 音樂基礎訓練</div>
                <div class="text-xs text-white/60 mt-1 tracking-wide">8個學習關卡</div>
            </div>
            <div class="flex items-center gap-3">
                <span class="student-badge" onclick="showStudentProfileForm()">未登入</span>
                <span class="text-3xl cursor-pointer hover:scale-125 hover:rotate-12 transition-all duration-200" onclick="showStudentProfileForm()">⚙️</span>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto px-6 pb-28 no-scrollbar space-y-5" id="level-list"></div>
        <!-- Soot Sprites \u5a64\u5a67\u5c0f\u7cbe\u9748 -->
        <div class="soot-sprite" style="left:4%;bottom:84px;width:14px;height:14px;--sp-dur:3.2s;--sp-delay:0s"></div>
        <div class="soot-sprite" style="left:90%;bottom:96px;width:10px;height:10px;--sp-dur:2.7s;--sp-delay:1.1s"></div>
        <div class="soot-sprite" style="left:50%;bottom:78px;width:12px;height:12px;--sp-dur:3.9s;--sp-delay:2.2s"></div>
    </div>

    <!-- 表演模式選單 -->
    <div id="view-performance" class="view-panel flex-1 flex flex-col h-full overflow-hidden hidden">
        <div class="pt-6 pb-6 px-8 flex justify-between items-center text-white bg-black/20 backdrop-blur-sm">
            <div class="flex flex-col">
                <div class="text-4xl font-black tracking-wider">🎤 曲目列表</div>
                <div class="text-xs text-white/60 mt-1 tracking-wide">精選音樂集合</div>
            </div>
            <div class="text-3xl">✉️</div>
        </div>
        <div class="px-8 mt-4 mb-4">
            <div class="bg-white/15 backdrop-blur-sm rounded-2xl p-4 border border-white/30 text-white shadow-lg text-center hover:bg-white/20 transition-all">
                <p class="text-xs font-bold leading-relaxed">💡 提示：請將 MP3 檔案與 HTML 放在同一資料夾中</p>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto px-8 pb-28 no-scrollbar space-y-5" id="song-list"></div>
    </div>

    <!-- 競技模式登入 -->
    <div id="view-comp-login" class="view-panel flex-1 flex flex-col items-center justify-center h-full hidden px-8 text-white">
        <h2 class="text-4xl font-black mb-6 tracking-widest">⚔️ 競技挑戰</h2>
        <p class="text-lg text-white/70 mb-4" id="comp-player-info"></p>
        <button class="btn btn-primary btn-lg" onclick="startCompetitionMatch()">⚔️ 開始競技</button>
    </div>

    <!-- 排行榜 -->
    <div id="view-leaderboard" class="view-panel flex-1 flex flex-col h-full overflow-hidden hidden">
        <div class="pt-6 pb-4 px-8 flex justify-between items-center text-white bg-black/20 backdrop-blur-sm">
            <div class="flex flex-col">
                <div class="text-4xl font-black tracking-wider">🏆 排行榜</div>
                <div class="text-xs text-white/60 mt-1 tracking-wide" id="leaderboard-status">本地排行</div>
            </div>
            <button onclick="refreshLeaderboard()" class="text-3xl hover:scale-110 transition-transform">🔄</button>
        </div>
        <div class="px-6 mt-3 mb-2 flex gap-2 overflow-x-auto no-scrollbar" id="leaderboard-filters">
            <button onclick="filterLeaderboard('all', this)" class="lb-filter-btn active">全部</button>
            <button onclick="filterLeaderboard('learning', this)" class="lb-filter-btn">學習</button>
            <button onclick="filterLeaderboard('performance', this)" class="lb-filter-btn">表演</button>
            <button onclick="filterLeaderboard('competition', this)" class="lb-filter-btn">競技</button>
        </div>
        <div class="flex-1 overflow-y-auto px-6 pb-28 no-scrollbar" id="leaderboard-list">
            <div class="text-center text-white/50 py-12">載入中...</div>
        </div>
    </div>

    <!-- 遊戲視圖 -->
    <div id="view-game" class="fixed inset-0 z-40 hidden flex flex-col">
        <div class="pt-10 pb-2 px-4 flex justify-between items-center text-white">
            <button class="btn btn-ghost btn-sm text-2xl" onclick="exitGame()">〈</button>
            <div class="text-center">
                <div id="game-title-display" class="font-black text-lg tracking-wide"></div>
                <div class="flex items-center justify-center gap-3 mt-1">
                    <span class="bg-white/20 px-3 py-0.5 rounded-full text-xs font-bold">4/4</span>
                    <span class="bg-white/20 px-3 py-0.5 rounded-full text-xs font-bold" id="game-bpm-display">90 BPM</span>
                </div>
            </div>
            <div class="flex flex-col items-center gap-1 min-w-[60px]">
                <button onclick="pauseGame()" class="bg-white/20 hover:bg-white/35 active:scale-90 text-white font-black text-base w-9 h-9 rounded-full border border-white/30 flex items-center justify-center transition-all">⏸</button>
                <div id="game-score-display" class="font-black text-lg text-yellow-300 drop-shadow leading-none">0</div>
                <div class="text-[9px] text-white/50">分數</div>
            </div>
        </div>
        <!-- 進度條 -->
        <div class="px-4 mt-1">
            <div class="game-progress-bar">
                <div class="game-progress-fill" id="game-progress" style="width: 0%"></div>
            </div>
        </div>
        <!-- 連擊顯示 -->
        <div class="flex justify-center mt-2 mb-1">
            <div id="game-combo-display" class="text-white/0 font-black text-lg transition-all duration-200"></div>
        </div>
        <div class="px-4 mb-2 flex-1 flex flex-col">
            <div class="score-container p-3 relative flex-1 flex flex-col justify-center">
                <canvas id="gameCanvas" width="800" height="360" class="w-full h-auto bg-transparent"></canvas>
            </div>
        </div>
        <div class="flex flex-col items-center justify-center text-white mb-2">
            <p class="text-sm font-bold tracking-wider text-white/70">🎵 跟著節拍點擊</p>
        </div>
        <div class="flex-1 px-4 pb-6 flex flex-col">
            <button id="hit-pad" class="w-full h-full flex items-center justify-center focus:outline-none touch-manipulation">
                <span class="text-7xl opacity-30 pointer-events-none">👆</span>
            </button>
        </div>
        <!-- 暫停遮罩 -->
        <div id="pause-overlay" class="hidden absolute inset-0 z-50 bg-black/55 backdrop-blur-sm flex flex-col items-center justify-center">
            <div class="text-7xl mb-4">⏸️</div>
            <h3 class="text-white font-black text-3xl mb-10 tracking-wide">已暫停</h3>
            <button onclick="resumeGame()" class="btn btn-primary btn-lg mb-4">▶ 繼續</button>
            <button onclick="exitGame()" class="btn btn-ghost">離開遊戲</button>
        </div>
    </div>

    <!-- 結算視圖 -->
    <div id="view-result-normal" class="fixed inset-0 z-50 hidden flex flex-col items-center justify-center p-8 text-white text-center overflow-y-auto" style="background:linear-gradient(180deg,#3D6B4A 0%,#4A8CA8 100%)">
        <div id="result-grade" class="text-8xl mb-2"></div>
        <h2 id="result-title" class="text-3xl font-black mb-1"></h2>
        <p id="result-accuracy" class="text-white/70 text-sm mb-6 tracking-wide"></p>
        
        <div class="bg-white/15 backdrop-blur rounded-3xl p-6 w-full max-w-md mb-6 border border-white/30">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-white/10 rounded-2xl p-4 hover:bg-white/20 transition-all">
                    <div class="text-xs text-white/70 mb-1">分數</div>
                    <div id="res-score" class="text-3xl font-black text-yellow-300">0</div>
                </div>
                <div class="bg-white/10 rounded-2xl p-4 hover:bg-white/20 transition-all">
                    <div class="text-xs text-white/70 mb-1">最高連擊</div>
                    <div id="res-combo" class="text-3xl font-black text-purple-300">0</div>
                </div>
                <div class="bg-white/10 rounded-2xl p-4 hover:bg-white/20 transition-all">
                    <div class="text-xs text-white/70 mb-1">正確</div>
                    <div id="res-perfect" class="text-3xl font-black text-green-300">0</div>
                </div>
                <div class="bg-white/10 rounded-2xl p-4 hover:bg-white/20 transition-all">
                    <div class="text-xs text-white/70 mb-1">漏打</div>
                    <div id="res-miss" class="text-3xl font-black text-red-300">0</div>
                </div>
            </div>
        </div>
        
        <div class="flex gap-3 w-full max-w-md">
            <button class="btn btn-ghost flex-1" onclick="replayGame()">🔄 重新挑戰</button>
            <button class="btn btn-primary flex-1" onclick="exitGame()">繼續 →</button>
        </div>
    </div>

    <!-- 競技結算視圖 -->
    <div id="view-result-comp" class="fixed inset-0 z-50 hidden flex flex-col items-center justify-center p-8 text-white overflow-y-auto" style="background:linear-gradient(180deg,#3D6B4A 0%,#4A8CA8 100%)">
        <h2 id="comp-song-title" class="text-5xl font-black mb-2 text-center drop-shadow-lg">比賽結果</h2>
        <p class="text-white/70 text-sm mb-12">與對手的表現對比</p>
        
        <div class="w-full max-w-lg flex justify-between relative mb-12 bg-white/10 backdrop-blur rounded-3xl p-8 border border-white/30">
            <div class="w-1/2 flex flex-col items-center border-r border-white/20 pr-6">
                <div class="text-3xl font-black mb-3">👤</div>
                <div class="text-sm font-bold mb-3 text-white/80">你</div>
                <svg viewBox="0 0 36 36" class="circular-chart text-green-300 w-20 h-20">
                    <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path class="circle" id="comp-player-ring" stroke="currentColor" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <text x="18" y="22" class="percentage" id="comp-player-pct">0%</text>
                </svg>
            </div>
            <div class="w-1/2 flex flex-col items-center pl-6">
                <div class="text-3xl font-black mb-3">🤖</div>
                <div class="text-sm font-bold mb-3 text-white/80">對手</div>
                <svg viewBox="0 0 36 36" class="circular-chart text-amber-200 w-20 h-20">
                    <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path class="circle" id="comp-bot-ring" stroke="currentColor" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <text x="18" y="22" class="percentage" id="comp-bot-pct">0%</text>
                </svg>
            </div>
        </div>
        <h3 id="comp-result-text" class="text-5xl font-black mb-10 drop-shadow-lg">你贏了</h3>
        
        <div class="w-full max-w-lg flex gap-4 mb-12">
            <div class="flex-1 bg-gradient-to-b from-amber-400 to-amber-600 rounded-2xl py-5 px-4 text-center shadow-lg hover:shadow-xl transition-all">
                <div class="text-xs text-white/90 mb-2 font-bold tracking-wide">評分變化</div>
                <div class="text-3xl font-black" id="comp-rating-change">+15</div>
            </div>
            <div class="flex-1 bg-gradient-to-b from-purple-400 to-purple-600 rounded-2xl py-5 px-4 text-center shadow-lg hover:shadow-xl transition-all">
                <div class="text-xs text-white/90 mb-2 font-bold tracking-wide">新評分</div>
                <div class="text-3xl font-black" id="comp-new-rating">1515</div>
            </div>
        </div>
        
        <div class="w-full max-w-lg flex flex-col gap-3">
            <button class="btn btn-primary btn-lg btn-full" onclick="startCompetitionMatch()">🔄 新回合</button>
            <button class="btn btn-ghost btn-lg btn-full" onclick="exitGame()">← 回到選單</button>
        </div>
    </div>

    <!-- 底部導航 -->
    <div id="bottom-nav" class="bottom-nav fixed bottom-0 w-full h-24 flex justify-around items-center pb-4 px-4 z-30">
        <div class="nav-item active flex flex-col items-center gap-1 w-20 py-2 rounded-2xl" onclick="switchTab('learning')"><span class="text-2xl">🎓</span><span class="text-[10px] font-bold text-white tracking-wide">學習</span></div>
        <div class="nav-item flex flex-col items-center gap-1 w-20 py-2 rounded-2xl" onclick="switchTab('performance')"><span class="text-2xl">🎤</span><span class="text-[10px] font-bold text-white tracking-wide">表演</span></div>
        <div class="nav-item flex flex-col items-center gap-1 w-20 py-2 rounded-2xl" onclick="switchTab('competition')"><span class="text-2xl">⭐</span><span class="text-[10px] font-bold text-white tracking-wide">競技</span></div>
        <div class="nav-item flex flex-col items-center gap-1 w-20 py-2 rounded-2xl" onclick="switchTab('leaderboard')"><span class="text-2xl">🏆</span><span class="text-[10px] font-bold text-white tracking-wide">排行榜</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
